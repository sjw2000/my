<!DOCTYPE html>
<html>
<body>

<h2>登录系统</h2>

<input id="email" type="email" placeholder="邮箱"><br><br>
<input id="password" type="password" placeholder="密码"><br><br>

<button id="regBtn">注册</button>
<button id="loginBtn">登录</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIEn31fCe_-a9-qDlRtBmnIO43NqVcet0",
  authDomain: "myapp-8d003.firebaseapp.com",
  projectId: "myapp-8d003",
  storageBucket: "myapp-8d003.firebasestorage.app",
  messagingSenderId: "131494170008",
  appId: "1:131494170008:web:6d8a379f126a38beca2fed",
  measurementId: "G-SG6H4K3MXS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 获取输入框
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

// 注册
document.getElementById('regBtn').addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if(!email){
    alert("请输入邮箱");
    return;
  }

  if(!password){
    alert("请输入密码");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(()=>alert('注册成功'))
    .catch(err=>alert(err.message));
});

// 登录
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  signInWithEmailAndPassword(auth, email, password)
    .then(()=>alert('登录成功'))
    .catch(err=>alert(err.message));
});
</script>

</body>
</html>
