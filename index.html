<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的社区</title>
</head>
<body>

<h2>登录系统</h2>

<input id="email" placeholder="邮箱"><br><br>
<input id="password" type="password" placeholder="密码"><br><br>

<button onclick="register()">注册</button>
<button onclick="login()">登录</button>
<button onclick="logout()">退出登录</button>

<hr>

<div id="userInfo"></div>

<hr>

<div id="postArea" style="display:none;">
  <h3>发帖</h3>
  <textarea id="content" placeholder="说点什么..." style="width:300px;height:80px;"></textarea><br><br>
  <button onclick="addPost()">发布</button>

  <h3>帖子列表</h3>
  <div id="postList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 换成你自己的 Firebase 配置
  const firebaseConfig = {
    apiKey: "AIzaSyBIEn31fCe_-a9-qDlRtBmnIO43NqVcet0",
    authDomain: "myapp-8d003.firebaseapp.com",
    projectId: "myapp-8d003",
    storageBucket: "myapp-8d003.firebasestorage.app",
    messagingSenderId: "131494170008",
    appId: "1:131494170008:web:ffbaa3624bb98023ca2fed",
    measurementId: "G-Q031FXQZCM"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ 自动登录状态监听
onAuthStateChanged(auth, (user) => {
  if (user) {
    showUser(user);
    document.getElementById("postArea").style.display = "block";
    loadPosts();
  } else {
    document.getElementById("userInfo").innerHTML = "";
    document.getElementById("postArea").style.display = "none";
  }
});

// ✅ 注册
window.register = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await createUserWithEmailAndPassword(auth, email, password);

    const avatar = "https://api.dicebear.com/7.x/avataaars/svg?seed=" + email;

    await updateProfile(res.user, {
      displayName: email.split("@")[0],
      photoURL: avatar
    });

    alert("注册成功");
  } catch (err) {
    alert(err.message);
  }
};

// ✅ 登录
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("登录成功");
  } catch (err) {
    alert(err.message);
  }
};

// ✅ 退出
window.logout = function () {
  signOut(auth);
};

// ✅ 显示用户信息
function showUser(user) {
  document.getElementById("userInfo").innerHTML = `
    <img src="${user.photoURL}" width="40" style="border-radius:50%">
    <b>${user.displayName}</b>
  `;
}

// ✅ 发帖
window.addPost = async function () {
  const content = document.getElementById("content").value;
  const user = auth.currentUser;

  if (!content) return alert("请输入内容");
  if (!user) return alert("请先登录");

  await addDoc(collection(db, "posts"), {
    content: content,
    name: user.displayName,
    avatar: user.photoURL,
    time: Date.now()
  });

  document.getElementById("content").value = "";
  loadPosts();
};

// ✅ 加载帖子
async function loadPosts() {
  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  const querySnapshot = await getDocs(q);

  const list = document.getElementById("postList");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    list.innerHTML += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px;">
        <img src="${data.avatar}" width="30" style="border-radius:50%">
        <b>${data.name}</b>
        <p>${data.content}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
