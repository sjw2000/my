<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>登录系统</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #userPanel {
      display: none;
      align-items: center;
      margin-top: 20px;
    }

    #userPanel img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
    }
  </style>
</head>

<body>

<h2>登录系统</h2>

<div id="authForm">
  <input id="email" type="email" placeholder="邮箱"><br><br>
  <input id="password" type="password" placeholder="密码"><br><br>

  <button onclick="register()">注册</button>
  <button onclick="login()">登录</button>
</div>

<div id="userPanel">
  <img id="avatar">
  <span id="name"></span>
  <button onclick="profile()">个人中心</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


  const firebaseConfig = {
    apiKey: "AIzaSyBIEn31fCe_-a9-qDlRtBmnIO43NqVcet0",
    authDomain: "myapp-8d003.firebaseapp.com",
    projectId: "myapp-8d003",
    storageBucket: "myapp-8d003.firebasestorage.app",
    messagingSenderId: "131494170008",
    appId: "1:131494170008:web:ffbaa3624bb98023ca2fed",
    measurementId: "G-Q031FXQZCM"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const defaultAvatar = "https://www.gravatar.com/avatar/?d=mp";

// 注册
window.register = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email) return alert("请输入邮箱");
  if (!password) return alert("请输入密码");

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (res) => {

      await updateProfile(res.user, {
        displayName: email.split("@")[0],
        photoURL: defaultAvatar
      });

      showUser(res.user);
      alert("注册成功");
    })
    .catch(err => alert(err.message));
};

// 登录
window.login = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(res => {
      showUser(res.user);
      alert("登录成功");
    })
    .catch(err => alert(err.message));
};

// 显示用户信息
function showUser(user) {
  document.getElementById("authForm").style.display = "none";
  document.getElementById("userPanel").style.display = "flex";

  document.getElementById("avatar").src = user.photoURL || defaultAvatar;
  document.getElementById("name").innerText = user.displayName || user.email;
}

// 个人中心
window.profile = function () {
  alert("这里可以做个人主页");
};

</script>

</body>
</html>
