<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>登录系统</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #userPanel { display: none; align-items: center; margin-top: 20px; }
    #userPanel img { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; }
    #buttons { margin-top: 20px; }
    button { margin-right: 10px; padding: 8px 12px; cursor: pointer; }
  </style>
</head>
<body>

<h2>登录系统</h2>

<!-- 注册/登录表单 -->
<div id="authForm">
  <input id="email" type="email" placeholder="邮箱"><br><br>
  <input id="password" type="password" placeholder="密码"><br><br>
  <div id="buttons">
    <button id="regBtn">注册</button>
    <button id="loginBtn">登录</button>
  </div>
</div>

<!-- 用户信息面板 -->
<div id="userPanel">
  <img id="userAvatar" src="" alt="头像">
  <span id="username"></span>
  <button onclick="openProfile()">个人中心</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIEn31fCe_-a9-qDlRtBmnIO43NqVcet0",
  authDomain: "myapp-8d003.firebaseapp.com",
  projectId: "myapp-8d003",
  storageBucket: "myapp-8d003.firebasestorage.app",
  messagingSenderId: "131494170008",
  appId: "1:131494170008:web:6d8a379f126a38beca2fed",
  measurementId: "G-SG6H4K3MXS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const userPanel = document.getElementById('userPanel');
const username = document.getElementById('username');
const userAvatar = document.getElementById('userAvatar');
const authForm = document.getElementById('authForm');

const defaultAvatar = "https://www.gravatar.com/avatar/?d=mp&f=y"; // 默认头像

// 注册事件
document.getElementById('regBtn').addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if(!email){ alert("请输入邮箱"); return; }
  if(!password){ alert("请输入密码"); return; }

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;
      // 设置默认头像和用户名
      updateProfile(user, {
        displayName: email.split("@")[0],
        photoURL: defaultAvatar
      });
      showUserPanel(user);
      alert("注册成功");
    })
    .catch(err => alert(err.message));
});

// 登录事件
document.getElementById('loginBtn').addEventListener('click', () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      const user = userCredential.user;
      showUserPanel(user);
      alert("登录成功");
    })
    .catch(err => alert(err.message));
});

// 显示用户头像和个人中心
function showUserPanel(user){
  authForm.style.display = "none"; // 隐藏注册/登录表单
  userPanel.style.display = "flex";
  userAvatar.src = user.photoURL || defaultAvatar;
  username.textContent = user.displayName || user.email;
}

// 点击个人中心
function openProfile(){
  alert("这里可以跳转到个人主页或信息页面！");
}
</script>

</body>
</html>
